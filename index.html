<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilimevi — Başvuru Formu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 4rem;
    }

    .logo {
      margin-bottom: 1.5rem;
    }

    .logo img {
      height: 60px;
      width: auto;
      display: block;
    }

    .title {
      font-family: Arial, sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 2rem;
    }

    .form-wrap {
      width: 100%;
      max-width: 600px;
    }

    #kl__form-container {
      min-height: 300px;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="https://www.bilimevi.com/assets/images/bilimevi_logo_761.svg" alt="Bilimevi" />
  </div>

  <div class="title">Yurtdışı Lise Tanıtım ve Kayıt Günü</div>

  <div class="form-wrap">
    <div id="kl__form-container"></div>
    <script src="https://assets.kylas.io/lead-capture-forms/lcf.min.js" form-id="9b4d9b8b-4893-430f-ab5f-60e778e213a8"></script>
  </div>

</body>
</html>
